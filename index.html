<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมคำนวณไม้เทียม - ไม้เทียมไทย จำกัด</title>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 1rem; border-bottom: 2px solid #8B4513; padding-bottom: 10px; }
        .brand { text-align: center; color: #8B4513; font-weight: bold; margin-bottom: 20px; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        
        /* ตกแต่ง Input ให้ใช้ง่ายบนมือถือ */
        input { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 18px; /* ขนาดตัวอักษรใหญ่ขึ้นเพื่อให้กดง่าย */
            background-color: #fff; 
            transition: border-color 0.3s;
        }
        input:focus { border-color: #8B4513; outline: none; background-color: #fffdfa; }
        
        .result-container { margin-top: 1.5rem; }
        .result-box { padding: 1.2rem; border-radius: 8px; margin-bottom: 12px; }
        .main-result { background-color: #fdf5e6; border-left: 6px solid #8B4513; }
        .extra-result { background-color: #f0f4f8; border-left: 6px solid #2980b9; display: flex; justify-content: space-between; align-items: center; }
        
        .result-label { font-size: 1rem; color: #555; }
        .result-value { font-size: 1.4rem; font-weight: bold; color: #2c3e50; }
        .highlight { color: #8B4513; font-size: 1.8rem; }
        hr { border: 0; border-top: 1px solid #eee; margin: 10px 0; }
    </style>
</head>
<body>

<div class="card">
    <div class="brand">บริษัท ไม้เทียมไทย จำกัด</div>
    <h2>คำนวณจำนวนไม้</h2>
    
    <div class="form-group">
        <label>หน้ากว้างของไม้ (มม.)</label>
        <input type="number" id="width" pattern="[0-9]*" inputmode="decimal" placeholder="เช่น 1xx" oninput="calculate()">
    </div>

    <div class="form-group">
        <label>ความยาวของไม้ (เมตร)</label>
        <input type="number" id="length" pattern="[0-9]*" inputmode="decimal" placeholder="เช่น 2.9" oninput="calculate()">
    </div>

    <div class="form-group">
        <label>พื้นที่ติดตั้งรวม (ตร.ม.)</label>
        <input type="number" id="area" pattern="[0-9]*" inputmode="decimal" placeholder="เช่น xxx" oninput="calculate()">
    </div>

    <div class="result-container">
        <div class="result-box main-result">
            <div class="result-label">จำนวนที่ใช้ (พอดีพื้นที่):</div>
            <div class="result-value"><span id="totalPlanks" class="highlight">0</span> เส้น</div>
            <small style="color: #666;">(เฉลี่ย <span id="perSqm">0</span> เส้น/ตร.ม.)</small>
        </div>

        <div class="result-box extra-result">
            <div class="result-label">เผื่อเสีย 5% :</div>
            <div class="result-value"><span id="plus5">0</span> เส้น</div>
        </div>

        <div class="result-box extra-result" style="border-left-color: #27ae60;">
            <div class="result-label">เผื่อเสีย 10% :</div>
            <div class="result-value"><span id="plus10">0</span> เส้น</div>
        </div>
    </div>
</div>

<script>
    function calculate() {
        const widthMm = parseFloat(document.getElementById('width').value);
        const lengthM = parseFloat(document.getElementById('length').value);
        const areaSqm = parseFloat(document.getElementById('area').value);

        if (widthMm > 0 && lengthM > 0 && areaSqm > 0) {
            const widthM = widthMm / 1000;
            const areaPerPlank = widthM * lengthM;
            const planksPerSqm = 1 / areaPerPlank;
            const baseTotal = planksPerSqm * areaSqm;

            document.getElementById('perSqm').innerText = planksPerSqm.toFixed(2);
            document.getElementById('totalPlanks').innerText = Math.ceil(baseTotal).toLocaleString();
            document.getElementById('plus5').innerText = Math.ceil(baseTotal * 1.05).toLocaleString();
            document.getElementById('plus10').innerText = Math.ceil(baseTotal * 1.10).toLocaleString();
        } else {
            document.getElementById('perSqm').innerText = "0";
            document.getElementById('totalPlanks').innerText = "0";
            document.getElementById('plus5').innerText = "0";
            document.getElementById('plus10').innerText = "0";
        }
    }
</script>

</body>
</html>
