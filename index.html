  <!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมคำนวณไม้เทียม - ไม้เทียมไทย จำกัด</title>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 1rem; border-bottom: 2px solid #8B4513; padding-bottom: 10px; }
        .brand { text-align: center; color: #8B4513; font-weight: bold; margin-bottom: 20px; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; background-color: #fff; }
        input:focus { border-color: #8B4513; outline: none; box-shadow: 0 0 5px rgba(139,69,19,0.2); }
        
        .result-container { margin-top: 1.5rem; }
        .result-box { padding: 1rem; border-radius: 8px; margin-bottom: 10px; }
        .main-result { background-color: #fdf5e6; border-left: 5px solid #8B4513; }
        .extra-result { background-color: #f0f4f8; border-left: 5px solid #2980b9; display: flex; justify-content: space-between; align-items: center; }
        
        .result-label { font-size: 0.95rem; color: #555; }
        .result-value { font-size: 1.3rem; font-weight: bold; color: #2c3e50; }
        .highlight { color: #8B4513; font-size: 1.6rem; }
        hr { border: 0; border-top: 1px solid #eee; margin: 10px 0; }
    </style>
</head>
<body>

<div class="card">
    <div class="brand">บริษัท ไม้เทียมไทย จำกัด</div>
    <h2>คำนวณจำนวนไม้</h2>
    
    <div class="form-group">
        <label>หน้ากว้างของไม้ (มม.)</label>
        <input type="number" id="width" placeholder="เช่น 150" oninput="calculate()">
    </div>

    <div class="form-group">
        <label>ความยาวของไม้ (เมตร)</label>
        <input type="number" id="length" placeholder="เช่น 2.9" oninput="calculate()">
    </div>

    <div class="form-group">
        <label>พื้นที่ติดตั้งรวม (ตร.ม.)</label>
        <input type="number" id="area" placeholder="เช่น 20" oninput="calculate()">
    </div>

    <div class="result-container">
        <div class="result-box main-result">
            <div class="result-label">จำนวนที่ต้องใช้ (พอดีพื้นที่):</div>
            <div class="result-value"><span id="totalPlanks" class="highlight">0</span> เส้น</div>
            <small style="color: #666;">(เฉลี่ย <span id="perSqm">0</span> เส้น/ตร.ม.)</small>
        </div>

        <div class="result-box extra-result">
            <div class="result-label">เผื่อ 5% :</div>
            <div class="result-value"><span id="plus5">0</span> เส้น</div>
        </div>

        <div class="result-box extra-result" style="border-left-color: #27ae60;">
            <div class="result-label">เผื่อ 10% :</div>
            <div class="result-value"><span id="plus10">0</span> เส้น</div>
        </div>
    </div>
</div>

<script>
    function calculate() {
        const widthMm = parseFloat(document.getElementById('width').value);
        const lengthM = parseFloat(document.getElementById('length').value);
        const areaSqm = parseFloat(document.getElementById('area').value);

        if (widthMm > 0 && lengthM > 0 && areaSqm > 0) {
            // 1. แปลงหน้ากว้างเป็นเมตร และหาพื้นที่ต่อแผ่น
            const widthM = widthMm / 1000;
            const areaPerPlank = widthM * lengthM;

            // 2. หาจำนวนเส้นต่อ 1 ตร.ม.
            const planksPerSqm = 1 / areaPerPlank;

            // 3. จำนวนเส้นทั้งหมด (พอดีพื้นที่)
            const baseTotal = planksPerSqm * areaSqm;

            // 4. คำนวณเผื่อ 5% และ 10%
            const total5 = baseTotal * 1.05;
            const total10 = baseTotal * 1.10;

            // แสดงผล (ใช้ Math.ceil เพื่อปัดเศษขึ้นเป็นจำนวนเส้นเต็มเสมอ)
            document.getElementById('perSqm').innerText = planksPerSqm.toFixed(2);
            document.getElementById('totalPlanks').innerText = Math.ceil(baseTotal);
            document.getElementById('plus5').innerText = Math.ceil(total5);
            document.getElementById('plus10').innerText = Math.ceil(total10);
        } else {
            document.getElementById('perSqm').innerText = "0";
            document.getElementById('totalPlanks').innerText = "0";
            document.getElementById('plus5').innerText = "0";
            document.getElementById('plus10').innerText = "0";
        }
    }
</script>

</body>
</html>
    
  </body>
  
</html>
